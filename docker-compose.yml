# =======================================================
# WHAT IS DOCKER COMPOSE?
# Docker Compose lets you define and run all services that
# make up your application in a single file. Instead of
# starting each container manually with 'docker run',
# you just run 'docker compose up' and everything starts
# in the right order with the right configuration.
# =======================================================

services:

  # -------------------------------------------------------
  # POSTGRES — Relational database
  # Used by patient-service to persist patient records.
  # -------------------------------------------------------
  postgres:
    # Use the official Postgres image (version 17).
    # We don't build this — it's a standard pre-built image.
    image: postgres:17
    container_name: patient-postgres
    environment:
      # These env vars are read by the Postgres image on first
      # startup to create the database, user, and password.
      POSTGRES_DB: patientdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      # HOST:CONTAINER — expose Postgres to your local machine
      # so you can connect with a DB client (e.g. DBeaver).
      - "5432:5432"
    volumes:
      # Mount a named volume so database data survives
      # container restarts. Without this, all data is lost
      # every time the container stops.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Before other services start, Docker checks that
      # Postgres is actually ready to accept connections —
      # not just that the container started.
      # pg_isready returns 0 (success) when Postgres is ready.
      test: ["CMD-SHELL", "pg_isready -U admin -d patientdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # PATIENT SERVICE — Core REST API for patient data
  # Handles CRUD operations on patients, stores data in
  # Postgres, and publishes events to Kafka.
  # -------------------------------------------------------
  patient-service:
    build:
      # context: . means the build context is the REPO ROOT.
      # This is required because patient-service uses a Maven
      # multi-module setup and needs the parent pom.xml.
      context: .
      dockerfile: patient-service/Dockerfile
    container_name: patient-service
    ports:
      - "4000:4000"
    environment:
      # Override Spring Boot's datasource config at runtime.
      # 'postgres' is the service name above — Docker's internal
      # DNS resolves it to the Postgres container's IP.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patientdb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
      # Tell Spring where the Kafka broker is.
      # 'kafka' is the service name defined below.
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      # Wait for Postgres to pass its healthcheck before
      # starting — otherwise the app crashes on boot because
      # it can't connect to the database.
      postgres:
        condition: service_healthy
      # Wait for Kafka to at least be started (not necessarily
      # fully ready) before booting.
      kafka:
        condition: service_started

  # -------------------------------------------------------
  # BILLING SERVICE — Handles billing logic
  # Listens to Kafka events from patient-service and exposes
  # both a REST API (4001) and a gRPC server (9001) so other
  # services can call billing operations directly.
  # -------------------------------------------------------
  billing-service:
    build:
      # This service has its own standalone pom.xml so the
      # build context can be just its own folder.
      context: ./billing-service
      dockerfile: Dockerfile
    container_name: billing-service
    ports:
      - "4001:4001" # HTTP REST API
      - "9001:9001" # gRPC server (for internal service-to-service calls)
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_started

  # -------------------------------------------------------
  # ANALYTICS SERVICE — Processes events for analytics
  # Consumes Kafka events published by other services and
  # stores or aggregates analytics data.
  # -------------------------------------------------------
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    ports:
      - "4002:4002"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_started

  # -------------------------------------------------------
  # API GATEWAY — Single entry point for all external traffic
  # All requests from clients (browser, mobile, Postman) go
  # here first. The gateway inspects the URL and forwards the
  # request to the correct internal service. This means clients
  # only need to know one address (port 4004) instead of each
  # service's individual port.
  # -------------------------------------------------------
  api-gateway:
    build:
      # context: . for the same multi-module Maven reason
      # as patient-service above.
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "4004:4004"
    depends_on:
      # The gateway routes requests to patient-service, so
      # patient-service must be up before the gateway starts.
      - patient-service

  # -------------------------------------------------------
  # KAFKA — Async message broker
  # Services communicate asynchronously by publishing events
  # to Kafka topics instead of calling each other directly.
  # This decouples services — if billing-service is down,
  # patient-service can still run and the event will be
  # processed when billing-service comes back up.
  # -------------------------------------------------------
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092" # Internal broker port (used by other containers)
      - "9094:9094" # External port (lets you connect from your host machine)
    environment:
      # Run both the broker and controller roles in one container
      # (KRaft mode — no separate ZooKeeper needed).
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      # Define listener addresses for each role.
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      # Advertise different addresses for internal vs external clients.
      # Internal containers use PLAINTEXT://kafka:9092 (Docker DNS).
      # Your host machine uses EXTERNAL://localhost:9094.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: "kafka-cluster-1"

  # -------------------------------------------------------
  # KAFKA UI — Web dashboard for Kafka
  # A browser-based UI to inspect Kafka topics, consumer
  # groups, and messages. Useful for debugging.
  # Access it at http://localhost:8080
  # -------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

# Named volumes are managed by Docker and persist across
# container restarts. 'postgres_data' keeps your DB data safe.
volumes:
  postgres_data: